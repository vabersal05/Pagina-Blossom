<div class="login-container">
  <h2>Iniciar Sesión</h2>

  <input type="email" [(ngModel)]="usuario" placeholder="Correo electrónico" />
  <input type="password" [(ngModel)]="contrasena" placeholder="Contraseña" />

  <button (click)="iniciarSesion()">Entrar</button>

  <p>¿No tienes cuenta? <a routerLink="/registrarse">Regístrate aquí</a></p>
</div>
