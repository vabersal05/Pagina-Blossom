<div class="card">
    <div class="img-container">
        <img [src]="'images/catalogo/' + producto.imagen" alt="{{producto.nombre}}">
    </div>
    <div class="info">
        <h3>{{producto.nombre}}</h3>
        <p>{{producto.marca}}</p>
        <p class="precio">${{producto.precio}}</p>
        <span class="badge" *ngIf="producto.stock > 0">Disponible</span>
        <span class="badge agotado" *ngIf="producto.stock === 0">Agotado</span>
    </div>
</div>
