<h1>Mensajes recibidos</h1>

<div *ngIf="mensajes.length > 0; else vacio" class="mensajes">
  <div *ngFor="let m of mensajes" class="card">
    <p><b>Nombre:</b> {{ m.nombre }}</p>
    <p><b>Correo:</b> {{ m.correo }}</p>
    <p><b>Asunto:</b> {{ m.asunto }}</p>
    <p><b>Mensaje:</b> {{ m.mensaje }}</p>
  </div>
</div>

<ng-template #vacio>
  <p class="empty">No hay mensajes aún</p>
</ng-template>
