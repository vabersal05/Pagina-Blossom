<nav class="navbar">
  <div class="logo">
    <img src="/images/logo.png" alt="🌸">
    <p>Blossom Detallitos</p>
  </div>

  <ul class="menu">
    <li><a routerLink="/home">Inicio</a></li>
    <li><a routerLink="/catalogo">Catálogo</a></li>
    <li><a routerLink="/nosotros">Nosotros</a></li>
  </ul>

  <!-- SI NO HA INICIADO SESIÓN -->
  <ng-container *ngIf="!authService.isLoggedIn()">
    <a routerLink="/iniciar-sesion">Iniciar sesión</a>
  </ng-container>

  <!-- SI YA INICIÓ SESIÓN -->
  <ng-container *ngIf="authService.isLoggedIn()">
    <a (click)="carritoService.toggle()">🛒 ({{ carritoService.cantidadTotal() }})</a>
    <a (click)="logout()">Cerrar sesión</a>
  </ng-container>

</nav>
